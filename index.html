<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Forms • V1 V2 V3 Ving</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #4cc9f0;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray-100: #e9ecef;
            --gray-200: #dee2e6;
            --gray-300: #ced4da;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #2b32b2 0%, #6f4b9c 100%);
            min-height: 100vh;
            width: 100%;
            margin: 0;
            padding: 20px;
            line-height: 1.7;
            color: var(--dark);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 25px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            min-height: 90vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--secondary);
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 12px;
            color: #9b59b6;
        }
        h2:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #9b59b6, #8e44ad);
            border-radius: 3px;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 30px 0 20px;
            color: #9b59b6;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
        }

        /* Verb Forms Button */
        .btn-verb-main {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            font-size: 1.3rem;
            padding: 16px 30px;
            margin: 20px auto;
            width: 100%;
            max-width: 350px;
            display: block;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-verb-main:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(145deg, #8e44ad, #6c3483);
        }
        .btn-verb-main:active {
            transform: translateY(1px);
        }

        /* Back button */
        .btn-back {
            background: linear-gradient(145deg, #ff4444, #aa0000);
            color: white;
            padding: 14px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: inline-block;
        }
        .btn-back:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        /* Verb Forms Display */
        .verb-forms-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
            width: 100%;
        }
        .verb-form-card {
            background: white;
            border-radius: 24px;
            padding: 20px 0;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(155, 89, 182, 0.3);
            transition: var(--transition);
            width: 100%;
        }
        .verb-form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -8px rgba(155, 89, 182, 0.25);
            border-color: #9b59b6;
        }
        .verb-form-card h3 {
            font-size: 1.5rem;
            color: #9b59b6;
            margin-bottom: 15px;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
            padding-left: 20px;
            padding-right: 20px;
        }
        .verb-images {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
        }
        .verb-images img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 2px solid rgba(155, 89, 182, 0.2);
            transition: var(--transition);
            display: block;
            margin: 0 auto;
        }
        .verb-images img:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }
        .image-caption {
            font-weight: 600;
            color: #9b59b6;
            margin-top: 5px;
            margin-bottom: 20px;
            text-align: center;
            padding-left: 20px;
            padding-right: 20px;
            font-size: 1.1rem;
        }

        /* Navigation Area */
        #navigationArea {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--gray-300);
            text-align: center;
            width: 100%;
        }
        .nav-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            width: 100%;
        }

        /* Loading Animation */
        .loading {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 2rem;
            }
            h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Main Menu Button -->
        <div style="text-align: center;">

                        </div>

                        <!-- V2 Section -->
                        <div class="verb-form-card">

                            <div class="verb-images">

                `
            }
        };

        // ---------- Main Functionality ----------
        let currentPage = 'mainMenu';

        function showVerbForms() {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            
            const verbPage = verbFormsData['verbForms'];
            if (verbPage) {
                contentArea.classList.add('loading');
                setTimeout(() => {
                    contentArea.innerHTML = `<h2>${verbPage.title}</h2>${verbPage.content}`;
                    contentArea.classList.remove('loading');
                    
                    // Create navigation buttons
                    let navHtml = '';
                    
                    // Back to Main button
                    navHtml += `<div class="back-controls">`;
                    navHtml += `<button class="btn-back" onclick="goBackToMain()">🏠 Back to Main</button>`;
                    navHtml += `</div>`;
                    
                    navigationArea.innerHTML = `<div class="nav-buttons">${navHtml}</div>`;
                    
                    // Scroll to top smoothly
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 250);
            }
        }

        function goBackToMain() {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            
            // Clear content and navigation
            contentArea.innerHTML = '';
            navigationArea.innerHTML = '';
            
            // Show main button again
            const mainBtn = document.querySelector('.btn-verb-main');
            if (mainBtn) {
                mainBtn.style.display = 'block';
            }
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initial setup on page load
        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            
            // Clear any existing content
            contentArea.innerHTML = '';
            navigationArea.innerHTML = '';
            
            // Optional: Show welcome message or instructions
            contentArea.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; background: linear-gradient(145deg, #f8f9fa, #ffffff); border-radius: 24px; margin: 20px 0;">
                    <h3 style="color: #9b59b6;">Welcome to Verb Forms Learning!</h3>
                    <p style="font-size: 1.1rem; margin: 20px 0;">Click the button above to view all verb forms with examples.</p>
                    <p style="font-size: 0.95rem; color: #666;">V1 (Base Form) • V2 (Past Simple) • V3 (Past Participle) • Ving (Present Participle)</p>
                </div>
            `;
        });
    </script>
</body>
</html>
